name: Deploy to GitHub Pages

# Builds the app with the GitHub Pages sub-path base (`/Loom/`) and publishes
# the static `dist/` bundle. The standard `npm run build` (base `/`) is left
# untouched — this uses the dedicated `build:pages` script.
#
# One-time setup in the repo: Settings → Pages → Build and deployment →
# Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
